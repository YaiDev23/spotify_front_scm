
<div style="min-height:520px; background:rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; padding:2rem 1rem; border-radius:var(--border-radius-lg);">
  <div style="background:var(--color-background-primary); border-radius:var(--border-radius-lg); border:0.5px solid var(--color-border-tertiary); width:100%; max-width:400px; padding:2rem; font-family:var(--font-sans);">

    <div style="display:flex; align-items:center; gap:10px; margin-bottom:1.5rem; padding-bottom:1.25rem; border-bottom:0.5px solid var(--color-border-tertiary);">
      <div style="width:36px; height:36px; background:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.42 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      </div>
      <div>
        <p style="font-size:15px; font-weight:500; margin:0; color:var(--color-text-primary);">Spotify</p>
        <p style="font-size:12px; color:var(--color-text-secondary); margin:0;">Verificación segura del pago</p>
      </div>
      <div style="margin-left:auto;">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
    </div>

    <p style="font-size:16px; font-weight:500; margin:0 0 0.35rem; color:var(--color-text-primary);">Ingresa el código de verificación</p>

    <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:0.9rem 1rem; margin-bottom:1.25rem;">
      <table style="width:100%; font-size:13px; border-collapse:collapse;">
        <tr>
          <td style="color:var(--color-text-secondary); padding:3px 0; width:110px;">Comercio</td>
          <td style="color:var(--color-text-primary); font-weight:500; text-align:right;">Spotify AB</td>
        </tr>
        <tr>
          <td style="color:var(--color-text-secondary); padding:3px 0;">Monto</td>
          <td style="color:var(--color-text-primary); font-weight:500; text-align:right;">4.900 COP</td>
        </tr>
        <tr>
          <td style="color:var(--color-text-secondary); padding:3px 0;">Tarjeta</td>
          <td style="color:var(--color-text-primary); font-weight:500; text-align:right;">XXXX XXXX XXXX 0173</td>
        </tr>
        <tr>
          <td style="color:var(--color-text-secondary); padding:3px 0;">Fecha</td>
          <td id="txdate" style="color:var(--color-text-primary); font-weight:500; text-align:right;"></td>
        </tr>
      </table>
    </div>

    <label style="font-size:12px; color:var(--color-text-secondary); display:block; margin-bottom:6px;">Código OTP</label>
    <div style="display:flex; gap:8px; margin-bottom:1rem;" id="otp-box">
      <input id="d0" maxlength="1" inputmode="numeric" style="width:100%; height:48px; text-align:center; font-size:20px; font-weight:500; border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); background:var(--color-background-primary); color:var(--color-text-primary); outline:none;" />
      <input id="d1" maxlength="1" inputmode="numeric" style="width:100%; height:48px; text-align:center; font-size:20px; font-weight:500; border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); background:var(--color-background-primary); color:var(--color-text-primary); outline:none;" />
      <input id="d2" maxlength="1" inputmode="numeric" style="width:100%; height:48px; text-align:center; font-size:20px; font-weight:500; border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); background:var(--color-background-primary); color:var(--color-text-primary); outline:none;" />
      <input id="d3" maxlength="1" inputmode="numeric" style="width:100%; height:48px; text-align:center; font-size:20px; font-weight:500; border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); background:var(--color-background-primary); color:var(--color-text-primary); outline:none;" />
      <input id="d4" maxlength="1" inputmode="numeric" style="width:100%; height:48px; text-align:center; font-size:20px; font-weight:500; border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); background:var(--color-background-primary); color:var(--color-text-primary); outline:none;" />
      <input id="d5" maxlength="1" inputmode="numeric" style="width:100%; height:48px; text-align:center; font-size:20px; font-weight:500; border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); background:var(--color-background-primary); color:var(--color-text-primary); outline:none;" />
    </div>

    <p id="err-msg" style="font-size:12px; color:#e74c3c; margin:0 0 0.75rem; min-height:16px; display:none;">Código incorrecto. Inténtalo de nuevo.</p>

    <button id="btn-submit" style="width:100%; height:44px; background:#1ed760; border:none; border-radius:22px; font-size:15px; font-weight:500; color:#000; cursor:pointer; margin-bottom:0.75rem;">Verificar pago</button>

    <div style="display:flex; justify-content:space-between; align-items:center;">
      <button id="btn-cancel" style="font-size:13px; color:var(--color-text-secondary); background:none; border:none; cursor:pointer; padding:0; text-decoration:underline;">Cancelar</button>
      <span style="font-size:13px; color:var(--color-text-secondary);">¿No llegó? <span id="resend-link" style="color:#1ed760; cursor:pointer; font-weight:500;"></span></span>
    </div>

    <div id="success-overlay" style="display:none; position:absolute; inset:0; background:var(--color-background-primary); border-radius:var(--border-radius-lg); flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center; padding:2rem;">
      <div style="width:56px; height:56px; background:#1ed760; border-radius:50%; display:flex; align-items:center; justify-content:center;">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#000" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <p style="font-size:16px; font-weight:500; margin:0; color:var(--color-text-primary);">Pago verificado</p>
      <p style="font-size:13px; color:var(--color-text-secondary); margin:0;">Tu suscripción Premium está activa.</p>
    </div>
  </div>
</div>

<script>
(function(){
  const inputs = [0,1,2,3,4,5].map(i => document.getElementById('d'+i));
  const btn = document.getElementById('btn-submit');
  const err = document.getElementById('err-msg');
  const resend = document.getElementById('resend-link');
  const overlay = document.getElementById('success-overlay');
  const card = overlay.parentElement;
  card.style.position = 'relative';
  card.style.overflow = 'hidden';

  const now = new Date();
  document.getElementById('txdate').textContent =
    now.toLocaleDateString('es-CO') + ' ' + now.toTimeString().slice(0,8);

  let timer = 30;
  function tick(){
    if(timer > 0){ resend.textContent = 'Reenviar ('+timer+'s)'; resend.style.color='var(--color-text-secondary)'; resend.style.cursor='default'; timer--; setTimeout(tick,1000); }
    else { resend.textContent = 'Reenviar código'; resend.style.color='#1ed760'; resend.style.cursor='pointer'; }
  }
  tick();

  resend.addEventListener('click', function(){
    if(timer > 0) return;
    inputs.forEach(i=>i.value='');
    inputs[0].focus();
    err.style.display='none';
    timer=30; tick();
  });

  inputs.forEach((inp,i)=>{
    inp.addEventListener('input', function(){
      inp.value = inp.value.replace(/\D/g,'').slice(-1);
      err.style.display='none';
      inp.style.borderColor = inp.value ? '#1ed760' : 'var(--color-border-secondary)';
      if(inp.value && i < 5) inputs[i+1].focus();
    });
    inp.addEventListener('keydown', function(e){
      if(e.key==='Backspace' && !inp.value && i>0){ inputs[i-1].focus(); inputs[i-1].value=''; inputs[i-1].style.borderColor='var(--color-border-secondary)'; }
    });
    inp.addEventListener('paste', function(e){
      e.preventDefault();
      const p = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
      p.split('').forEach((c,j)=>{ if(inputs[j]){ inputs[j].value=c; inputs[j].style.borderColor='#1ed760'; } });
      const nxt = p.length < 6 ? p.length : 5;
      inputs[nxt].focus();
    });
  });

  btn.addEventListener('click', function(){
    const code = inputs.map(i=>i.value).join('');
    if(code.length < 6){ err.textContent='Ingresa el código completo de 6 dígitos.'; err.style.display='block'; return; }
    btn.textContent = 'Verificando...'; btn.disabled = true;
    setTimeout(function(){
      overlay.style.display='flex';
    }, 1200);
  });

  document.getElementById('btn-cancel').addEventListener('click', function(){
    inputs.forEach(i=>{ i.value=''; i.style.borderColor='var(--color-border-secondary)'; });
    err.style.display='none';
    btn.textContent='Verificar pago'; btn.disabled=false;
  });
})();
</script>
